<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Number Hunter</title>

<style>
body{
font-family:tahoma;
background:#0f172a;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#1e293b;
padding:30px;
border-radius:20px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

h1{
color:#38bdf8;
}

input{
width:100%;
padding:12px;
margin:15px 0;
border:none;
border-radius:10px;
font-size:18px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
font-size:18px;
}

#msg{
margin-top:15px;
font-size:20px;
}

.score{
margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h1>🎯 شکارچی عدد</h1>

<p>یک عدد بین 1 تا 100 حدس بزن</p>

<input type="number" id="guess">

<button onclick="checkGuess()">حدس بزن</button>

<div id="msg"></div>

<div class="score">
امتیاز: <span id="score">100</span>
</div>

</div>

<script>

let secret=Math.floor(Math.random()*100)+1;
let score=100;

function checkGuess(){

let guess=Number(document.getElementById("guess").value);

if(!guess)return;

if(guess===secret){

document.getElementById("msg").innerHTML=
"🏆 برنده شدی!";

}

else if(guess>secret){

score-=10;
document.getElementById("msg").innerHTML=
"📉 عدد کوچکتره";

}

else{

score-=10;
document.getElementById("msg").innerHTML=
"📈 عدد بزرگتره";

}

if(score<0)score=0;

document.getElementById("score").innerText=score;

}

</script>

</body>
</html>
