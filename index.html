<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>راز هیتلر+</title>

<style>
body{
background:#111;
color:white;
font-family:tahoma;
text-align:center;
padding:20px;
}

h1{
color:gold;
}

input{
padding:10px;
margin:5px;
width:220px;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

.player{
background:#222;
padding:10px;
margin:5px;
border-radius:10px;
}

.role{
color:#ffd700;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🎭 راز هیتلر+</h1>

<div id="setup">

<input id="p1" placeholder="بازیکن 1">
<input id="p2" placeholder="بازیکن 2">
<input id="p3" placeholder="بازیکن 3">
<input id="p4" placeholder="بازیکن 4">
<input id="p5" placeholder="بازیکن 5">
<input id="p6" placeholder="بازیکن 6">

<br>

<button onclick="startGame()">
شروع بازی
</button>

</div>

<div id="game"></div>

<script>

const roles=[
"شهروند",
"شهروند",
"آزرائیل",
"جلاد",
"هیتلر",
"استالین"
];

function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=[array[j],array[i]];
}

return array;
}

function startGame(){

let players=[];

for(let i=1;i<=6;i++){

let name=document.getElementById("p"+i).value;

if(name.trim()==""){

alert("نام همه بازیکن‌ها را وارد کنید");
return;
}

players.push(name);
}

let shuffledRoles=shuffle([...roles]);

let html="<h2>نقش‌ها</h2>";

for(let i=0;i<players.length;i++){

html+=`
<div class="player">
${players[i]}
<br>
<span class="role">
${shuffledRoles[i]}
</span>
</div>
`;
}

html+=`
<br>
<button onclick="location.reload()">
بازی جدید
</button>
`;

document.getElementById("game").innerHTML=html;

document.getElementById("setup").style.display="none";

}

</script>

</body>
</html>
